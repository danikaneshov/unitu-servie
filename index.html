<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Fifty ERP</title>
    <script>
      // Определяем роут ДО загрузки React и СОЗДАЁМ нужные теги
      (function() {
        var isAdmin = window.location.pathname.startsWith('/admin');
        var iconFolder = isAdmin ? '/icons-admin' : '/icons-client';
        var manifestFile = isAdmin ? '/manifest-admin.json' : '/manifest-client.json';

        // Favicon
        var favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/png';
        favicon.id = 'dynamic-favicon';
        favicon.href = iconFolder + '/icon-192x192.png';
        document.head.appendChild(favicon);

        // Apple Touch Icon (для iPhone домашнего экрана)
        var sizes = ['180', '152', '144', '192'];
        sizes.forEach(function(size) {
          var apple = document.createElement('link');
          apple.rel = 'apple-touch-icon';
          apple.sizes = size + 'x' + size;
          apple.href = iconFolder + '/icon-' + (size === '180' ? '192x192' : size + 'x' + size) + '.png';
          document.head.appendChild(apple);
        });

        // Manifest (PWA)
        var manifest = document.createElement('link');
        manifest.rel = 'manifest';
        manifest.id = 'dynamic-manifest';
        manifest.href = manifestFile;
        document.head.appendChild(manifest);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
